{% extends "base.html" %}
{% load crispy_forms_tags %}
<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <title>Crea Beneficiario</title>
  </head>
  <body>
    {% block content %}
    <br>
    <div class="container">
      <div class="row justify-content-center">
          <div class="alert alert-success">
            <h2 style="text-align:center;">
                <b>
                <div style="font-variant: small-caps;">INSERISCI UN NUOVO BENEFICIARIO
                </b>
                </div> 
          </h2>
        </div>
    </div>
  </div>   
    <div class="container">
    <br>
    <br>
      <form action="" method="POST" novalidate>
        {% csrf_token %}
        <div class="row justify-content-center">
          <div class="col-md-6">
            {{ error }}
            {{ form|crispy }}
          </div>
        </div>
        <input type="hidden" value={{ request.user.pk }} name="iduser"/>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <input type="submit" class = "btn btn-danger" value="Invia!">
            </div>
        </div>
      </form>
    </div>
    {% endblock content %}
  </body>
</html>
